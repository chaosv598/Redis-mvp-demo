# Patch overlay CI —— 一键 verify
# 跑 bash tools/verify.sh,PR 触发时执行
# 历史:本文件早期含 7 个 job(doctor/lint/check-series/check-deps/check-owners/check-apply/check-tag)
# 现在合并为 1 个 verify job(2026-07-13 simplify-v2)

name: verify

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (patch overlay 一键校验)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pyyaml
        run: pip install pyyaml --quiet
      - name: Run verify
        run: bash tools/verify.sh
      - name: Install Redis build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config tcl
      - name: Run patched Redis E2E
        env:
          E2E_RESULTS_DIR: ${{ runner.temp }}/redis-e2e-results
        run: bash tools/verify.sh --e2e redis-7.0.15
      - name: Upload Redis E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redis-e2e-results
          path: ${{ runner.temp }}/redis-e2e-results
          if-no-files-found: warn
