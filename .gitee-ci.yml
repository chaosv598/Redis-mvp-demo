# boostkit/v5 MVP CI 4 步必跑(可直接贴用)
stages:
  - lint
  - apply
  - owners

doctor:
  stage: lint
  image: python:3.11
  script:
    - pip install pyyaml --quiet
    - python tools/doctor.py
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  allow_failure: false

lint-yaml:
  stage: lint
  image: python:3.11
  script:
    - pip install pyyaml --quiet
    - python tools/lint.py boostkit.yaml
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  allow_failure: false

check-series:
  stage: lint
  image: python:3.11
  script: [python tools/check-series.py]
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  allow_failure: false

check-apply:
  stage: apply
  image: alpine:latest
  script:
    - apk add --no-cache bash git
    - bash tools/check-apply.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  allow_failure: true
  artifacts:
    when: on_failure
    paths: [versions/*/reports/]

check-owners:
  stage: owners
  image: python:3.11
  script: [python tools/check-owners.py OWNERS]
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  allow_failure: false
